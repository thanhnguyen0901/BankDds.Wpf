name: .NET (restore, build, test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [ Debug, Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BankDds.Wpf.sln

      - name: Build
        run: dotnet build BankDds.Wpf.sln -c ${{ matrix.configuration }} --no-restore

      # Run unit tests only if there is at least one test project
      - name: Test (if any)
        shell: pwsh
        run: |
          $solution = "BankDds.Wpf.sln"
          $testProjects = Get-ChildItem -Recurse -Filter *.csproj |
            Where-Object { $_.FullName -match '(?i)test(s)?' }

          if ($testProjects.Count -eq 0) {
            Write-Host "No test projects found (name does not contain Test/Tests). Skipping dotnet test."
            exit 0
          }

          dotnet test $solution -c "${{ matrix.configuration }}" --no-build
